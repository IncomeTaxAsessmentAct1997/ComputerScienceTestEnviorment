<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assignments</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../shared.css">
    <link rel="stylesheet" href="home.css">
</head>
<body>
    <div class="navbar">
        <div class="nav-left">
            <svg class="home-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
            </svg>
        </div>
        <div class="nav-center"></div>
        <div class="nav-right">
            <div class="profile-wrapper">
                <button class="profile-icon" id="profile-btn">
                    <svg class="profile-default-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                    </svg>
                    <span class="profile-initials" id="profile-initials"></span>
                </button>
                <div class="profile-dropdown" id="profile-dropdown">
                    <div class="dropdown-email" id="dropdown-email">
                        <span>Signed in as</span>
                        <span id="dropdown-email-text"></span>
                    </div>
                    <button class="btn-logout" id="logout-btn">
                        <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                            <polyline points="16 17 21 12 16 7"/>
                            <line x1="21" y1="12" x2="9" y2="12"/>
                        </svg>
                        Log out
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div class="home-container">
        <div class="class-header">
            <div class="class-header-inner">
                <div class="class-meta">
                    <span class="class-label">Current Class</span>
                    <div class="class-switcher" id="class-switcher">
                        <h1 class="class-name" id="class-name">Loading...</h1>
                        <svg class="class-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                            <polyline points="6 9 12 15 18 9"/>
                        </svg>
                        <div class="class-dropdown" id="class-dropdown"></div>
                    </div>
                </div>
                <div class="class-stats">
                    <div class="stat-pill">
                        <span class="stat-num" id="stat-solved">0</span>
                        <span class="stat-label">Solved</span>
                    </div>
                    <div class="stat-divider"></div>
                    <div class="stat-pill">
                        <span class="stat-num" id="stat-total">0</span>
                        <span class="stat-label">Total</span>
                    </div>
                    <div class="progress-ring-wrap">
                        <svg class="progress-ring" width="48" height="48" viewBox="0 0 48 48">
                            <circle class="progress-ring-bg" cx="24" cy="24" r="19" fill="none" stroke-width="4"/>
                            <circle class="progress-ring-fill" id="progress-ring-fill" cx="24" cy="24" r="19" fill="none" stroke-width="4" stroke-linecap="round"/>
                        </svg>
                        <span class="progress-pct" id="progress-pct">0%</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="problem-list-wrap">
            <div class="problem-list-header">
                <span class="col-status"></span>
                <span class="col-num-h">#</span>
                <span class="col-title">Title</span>
                <span class="col-honors-h">Type</span>
                <span class="col-edit" id="col-edit-header"></span>
            </div>
            <div class="problem-list" id="problem-list"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../config.js"></script>
    <script src="../shared.js"></script>
    <script src="home.js"></script>
</body>
</html>

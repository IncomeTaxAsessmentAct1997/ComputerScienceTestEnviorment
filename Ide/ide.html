<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Environment</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/split.js/1.6.0/split.min.js"></script>
    <script src="https://cdn.jsdelivr.net/pyodMain/v0.25.0/full/pyodide.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs/loader.js"></script>
    <link rel="stylesheet" href="../shared.css">
    <link rel="stylesheet" href="ide.css">
</head>
<body>
    <div class="navbar">
        <div class="nav-left">
            <svg class="home-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
            </svg>
        </div>
        <div class="nav-center"></div>
        <div class="nav-right">
            <div class="profile-wrapper">
                <button class="profile-icon" id="profile-btn">
                    <svg class="profile-default-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                    </svg>
                    <span class="profile-initials" id="profile-initials"></span>
                </button>
                <div class="profile-dropdown" id="profile-dropdown">
                    <div class="dropdown-email" id="dropdown-email">
                        <span>Signed in as</span>
                        <span id="dropdown-email-text"></span>
                    </div>
                    <button class="btn-logout" id="logout-btn">
                        <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                            <polyline points="16 17 21 12 16 7"/>
                            <line x1="21" y1="12" x2="9" y2="12"/>
                        </svg>
                        Log out
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div class="main-container">
        <div id="left-split" class="split">
            <div id="problem-panel" class="panel">
                <div class="panel-content"></div>
            </div>
            <div id="canvas-panel" class="panel">
                <div class="panel-header flex-header">
                    <span>Visualization Canvas</span>
                </div>
                <div id="canvas-container" class="panel-content canvas-container">
                    <canvas id="myCanvas"></canvas>
                </div>
            </div>
        </div>
        <div id="right-split" class="split">
            <div id="editor-panel" class="panel">
                <div class="panel-header flex-header">
                    <span>🐍 script.py</span>
                </div>
                <div id="editor-container" class="panel-content">
                    <div id="monaco-editor"></div>
                </div>
                <div class="editor-action-bar">
                    <button class="btn-run" id="run-btn" disabled>
                        <svg viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M8 5v14l11-7z"/></svg>
                        Run
                    </button>
                    <button class="btn-submit" id="submit-btn" disabled>Submit answer</button>
                </div>
            </div>
            <div id="terminal-panel" class="panel terminal-override">
                <div class="terminal-titlebar">
                    <span class="terminal-title">bash — python3</span>
                    <button class="terminal-close-btn" id="terminal-close-btn" title="Close">&#x2715;</button>
                </div>
                <div class="terminal-body" id="terminal-body">
                    <div id="terminal-output"></div>
                    <div class="term-input-line" id="term-input-line">
                        <span class="term-prompt" id="term-input-prompt">user@pyenv:~$</span>
                        <input type="text" id="term-input" class="term-input" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" placeholder="" />
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../config.js"></script>
    <script src="../shared.js"></script>
    <script src="terminal.js"></script>
    <script src="python.js"></script>
    <script src="ide.js"></script>
</body>
</html>
